<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg-main:#020617;
--bg-gradient:#0f172a;

--card-bg:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.15);

--accent1:#6366f1;
--accent2:#8b5cf6;

--text-main:#ffffff;
--text-muted:#94a3b8;

--radius:14px;
--transition:.35s cubic-bezier(.4,0,.2,1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'DM Sans',sans-serif;

background:
linear-gradient(135deg,#020617,#0f172a,#1e293b);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;
color:var(--text-main);
}

.container{
width:100%;
max-width:460px;
}

.card{
backdrop-filter:blur(20px);
background:var(--card-bg);
border:1px solid var(--border);
border-radius:var(--radius);

padding:46px 40px;

box-shadow:
0 10px 35px rgba(0,0,0,.5),
inset 0 1px 0 rgba(255,255,255,.05);
}

.header{
text-align:center;
margin-bottom:36px;
}

.header-label{
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
color:#a5b4fc;
margin-bottom:12px;
}

.header h1{
font-size:30px;
font-weight:600;
margin-bottom:6px;
}

.header p{
font-size:14px;
color:var(--text-muted);
}

.form-group{
margin-bottom:22px;
}

label{
display:block;
font-size:12px;
letter-spacing:1px;
margin-bottom:8px;
color:#cbd5f5;
}

input,
textarea{
width:100%;
padding:16px;

border-radius:10px;
border:1px solid rgba(255,255,255,0.15);

background:rgba(255,255,255,0.04);
color:white;

font-size:14px;
outline:none;

transition:var(--transition);
}

input::placeholder,
textarea::placeholder{
color:#64748b;
}

input:focus,
textarea:focus{
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,.25);
}

textarea{
min-height:120px;
resize:vertical;
}

.submit-btn{
width:100%;
padding:16px;

border:none;
border-radius:12px;

background:linear-gradient(135deg,var(--accent1),var(--accent2));

font-weight:600;
letter-spacing:1px;
font-size:13px;
text-transform:uppercase;

color:white;
cursor:pointer;

transition:var(--transition);

margin-top:6px;
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(99,102,241,.45);
}

.submit-btn:disabled{
opacity:.6;
cursor:not-allowed;
}

.status{
margin-top:20px;
padding:14px;
border-radius:10px;
font-size:13px;
text-align:center;
display:none;
}

.status.show{
display:block;
}

.status.success{
background:rgba(34,197,94,.15);
border:1px solid rgba(34,197,94,.4);
}

.status.error{
background:rgba(239,68,68,.15);
border:1px solid rgba(239,68,68,.4);
}

.wa-badge{
display:flex;
align-items:center;
justify-content:center;
gap:6px;

margin-top:26px;
font-size:11px;
color:#94a3b8;
}

.wa-badge svg{
width:14px;
height:14px;
fill:currentColor;
}

@media(max-width:480px){

.card{
padding:34px 26px;
}

.header h1{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="header">
<p class="header-label">Get in Touch</p>
<h1>Send us a message</h1>
<p>We'll respond as soon as possible</p>
</div>

<form id="contactForm">

<div class="form-group">
<label for="name">Your Name</label>
<input type="text" id="name" name="name" placeholder="John Doe" required>
</div>

<div class="form-group">
<label for="number">Phone Number</label>
<input type="tel" id="number" name="number" placeholder="+1 234 567 8900" required>
</div>

<div class="form-group">
<label for="message">Message</label>
<textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
</div>

<button type="submit" id="submitBtn" class="submit-btn">
Send Message
</button>

</form>

<div id="status" class="status"></div>

<div class="wa-badge">

<svg viewBox="0 0 24 24">
<path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/>
</svg>

Powered by WhatsApp

</div>

</div>
</div>

<script>

const form=document.getElementById('contactForm');
const submitBtn=document.getElementById('submitBtn');
const statusDiv=document.getElementById('status');

form.addEventListener('submit',async(e)=>{

e.preventDefault();

const formData={
name:document.getElementById('name').value,
number:document.getElementById('number').value,
message:document.getElementById('message').value
};

submitBtn.disabled=true;
submitBtn.textContent='Sending...';
statusDiv.className='status';

try{

const response=await fetch('/send-message',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(formData)
});

const result=await response.json();

if(response.ok){

statusDiv.className='status success show';
statusDiv.textContent='Message sent successfully!';

form.reset();

}else{

statusDiv.className='status error show';
statusDiv.textContent=result.error||'Failed to send message.';

}

}catch(error){

statusDiv.className='status error show';
statusDiv.textContent='Network error. Please check your connection.';

}

submitBtn.disabled=false;
submitBtn.textContent='Send Message';

});

</script>

</body>
</html>
